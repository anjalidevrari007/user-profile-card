<!DOCTYPE html>
<html>
<head>
    <title>User Profile Card</title>
</head>
<body>

    <h1>User Profile Card Generator</h1>

    <form action="/profile" method="POST">

        <input type="text"
               name="name"
               placeholder="Enter Name"
               required>

        <br><br>

        <textarea name="bio"
                  placeholder="Enter Bio"
                  required></textarea>

        <br><br>

        <input type="text"
               name="image"
               placeholder="Enter Image URL"
               required>

        <br><br>

        <button type="submit">
            Generate Card
        </button>

    </form>

    {% if name %}

    <hr>

    <h2>{{ name }}</h2>

    <img src="{{ image }}"
         width="200">

    <p>{{ bio }}</p>

    {% endif %}

</body>
</html>
